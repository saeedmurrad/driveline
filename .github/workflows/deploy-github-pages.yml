# Deploy static Angular browser build to GitHub Pages (project site: /driveline/)
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: driveline/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: driveline

      - name: Inject Web3Forms access key (optional)
        env:
          WEB3FORMS_ACCESS_KEY: ${{ secrets.WEB3FORMS_ACCESS_KEY }}
        run: |
          python3 << 'PY'
          import os, re
          key = os.environ.get("WEB3FORMS_ACCESS_KEY", "").strip()
          if not key:
              exit(0)
          path = "driveline/src/environments/environment.prod.ts"
          with open(path) as f:
              text = f.read()
          safe = key.replace("\\", "\\\\").replace("'", "\\'")
          text, n = re.subn(
              r"web3formsAccessKey:\s*''",
              f"web3formsAccessKey: '{safe}'",
              text,
              count=1,
          )
          if n != 1:
              raise SystemExit(f"Could not patch web3formsAccessKey in {path}")
          with open(path, "w") as f:
              f.write(text)
          PY

      - name: Inject DVLA lookup URL (CORS proxy for static Pages)
        env:
          DVLA_LOOKUP_URL: ${{ secrets.DVLA_LOOKUP_URL }}
        run: |
          python3 << 'PY'
          import json, os, re
          url = os.environ.get("DVLA_LOOKUP_URL", "").strip()
          if not url:
              print("DVLA_LOOKUP_URL secret not set; build uses dvlaLookupUrl from environment.prod.ts (direct DVLA may fail in browser due to CORS).")
              exit(0)
          path = "driveline/src/environments/environment.prod.ts"
          with open(path) as f:
              text = f.read()
          replacement = f"dvlaLookupUrl: {json.dumps(url)},"
          text, n = re.subn(
              r"dvlaLookupUrl:\s*\n\s*'[^']*',",
              replacement,
              text,
              count=1,
          )
          if n != 1:
              raise SystemExit(f"Could not patch dvlaLookupUrl in {path}")
          with open(path, "w") as f:
              f.write(text)
          print("Patched dvlaLookupUrl for GitHub Pages build.")
          PY

      - name: Build (production, GitHub Pages base href)
        run: npm run build:gh-pages
        working-directory: driveline

      - name: SPA fallback + disable Jekyll
        run: |
          cp driveline/dist/driveline/browser/index.html driveline/dist/driveline/browser/404.html
          touch driveline/dist/driveline/browser/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: driveline/dist/driveline/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
