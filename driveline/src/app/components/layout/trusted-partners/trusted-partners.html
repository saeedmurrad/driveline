<section
  class="trusted-partners max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10"
  [ngClass]="{
    'trusted-partners--dark': variant() === 'dark',
    'trusted-partners--light': variant() === 'light',
  }"
  aria-label="Trusted finance partners"
>
  <p
    class="text-center text-xs uppercase tracking-[0.2em] font-semibold mb-8"
    [ngClass]="{
      'text-gray-500': variant() === 'dark',
      'text-gray-600 dark:text-gray-400': variant() === 'light',
    }"
  >
    Proud to work with
  </p>
  <ul class="flex flex-wrap items-center justify-center gap-x-8 gap-y-6 list-none m-0 p-0">
    @for (p of partners; track p.name) {
      <li>
        <a
          [href]="p.url"
          target="_blank"
          rel="noopener noreferrer"
          class="trusted-partners__link block text-center text-sm font-semibold tracking-tight transition-colors duration-200 max-w-[11rem] leading-snug"
        >
          {{ p.name }}
        </a>
      </li>
    }
  </ul>
</section>
