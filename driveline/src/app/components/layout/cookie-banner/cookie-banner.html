@if (isVisible()) {
  <div class="fixed bottom-0 left-0 right-0 z-50 p-4 animate-slide-up">
    <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-2xl border border-gray-100 p-5 flex flex-col sm:flex-row items-start sm:items-center gap-4">
      <div class="w-10 h-10 bg-blue-50 rounded-xl flex items-center justify-center flex-shrink-0">
        <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
      </div>
      <div class="flex-1">
        <p class="text-sm text-gray-700 leading-relaxed">
          We use cookies to enhance your browsing experience and analyse our website traffic.
          <a routerLink="/legal/cookie-policy" class="text-blue-600 hover:underline font-medium">Read our Cookie Policy</a>
        </p>
      </div>
      <div class="flex items-center gap-3 flex-shrink-0">
        <button
          (click)="reject()"
          class="px-4 py-2 text-sm font-medium text-gray-600 hover:text-gray-800 bg-gray-100 hover:bg-gray-200 rounded-lg transition-colors duration-200"
        >
          Reject
        </button>
        <button
          (click)="accept()"
          class="px-5 py-2 text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 rounded-lg transition-colors duration-200"
        >
          Accept
        </button>
      </div>
    </div>
  </div>
}
