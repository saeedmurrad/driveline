<div class="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-sm border border-gray-100 dark:border-slate-700 h-full flex flex-col">
  <!-- Stars -->
  <div class="flex items-center gap-0.5 mb-3">
    @for (s of stars; track $index) {
      <svg class="w-4.5 h-4.5 text-yellow-400" fill="currentColor" viewBox="0 0 20 20">
        <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
      </svg>
    }
    @for (s of emptyStars; track $index) {
      <svg class="w-4.5 h-4.5 text-gray-200 dark:text-slate-600" fill="currentColor" viewBox="0 0 20 20">
        <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
      </svg>
    }
  </div>

  <!-- Title -->
  <h3 class="font-semibold text-gray-900 dark:text-gray-100 mb-2 text-sm">{{ review.title }}</h3>

  <!-- Body -->
  <p class="text-gray-600 dark:text-gray-300 text-sm leading-relaxed flex-1">{{ review.body }}</p>

  <!-- Footer -->
  <div class="flex items-center justify-between mt-4 pt-4 border-t border-gray-50 dark:border-slate-700">
    <div class="flex items-center gap-2.5">
      <div class="w-8 h-8 rounded-full bg-blue-100 dark:bg-blue-950/60 flex items-center justify-center text-blue-600 dark:text-blue-300 font-bold text-sm">
        {{ review.author.charAt(0) }}
      </div>
      <div>
        <p class="text-sm font-semibold text-gray-800 dark:text-gray-200">{{ review.author }}</p>
        <p class="text-xs text-gray-400 dark:text-gray-500">{{ formatDate(review.date) }}</p>
      </div>
    </div>
    @if (review.verified) {
      <div class="flex items-center gap-1 text-xs text-green-600">
        <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
        </svg>
        Verified
      </div>
    }
  </div>
</div>
