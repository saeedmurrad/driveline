# Deploy static Angular browser build to GitHub Pages (project site: /driveline/)
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: driveline/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: driveline

      - name: Build (production, GitHub Pages base href)
        run: npm run build:gh-pages
        working-directory: driveline

      - name: SPA fallback + disable Jekyll
        run: |
          cp driveline/dist/driveline/browser/index.html driveline/dist/driveline/browser/404.html
          touch driveline/dist/driveline/browser/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: driveline/dist/driveline/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
