<header
  class="header-shell fixed top-0 left-0 right-0 z-50 border-b backdrop-blur-2xl transition-all duration-500 ease-out"
  [ngClass]="
    headerScrolled()
      ? 'bg-white/88 border-stone-200/90 shadow-lg shadow-stone-900/[0.06] dark:bg-slate-950/90 dark:border-slate-700/90 dark:shadow-black/40'
      : 'bg-white/72 border-white/40 shadow-md shadow-slate-900/[0.04] dark:bg-slate-950/70 dark:border-slate-700/40 dark:shadow-black/20'
  "
>
  <div class="header-glow-line opacity-40 dark:opacity-30" aria-hidden="true"></div>

  <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between gap-3 h-16 md:h-[4.25rem]">
      <!-- Logo -->
      <a
        routerLink="/"
        class="group flex items-center gap-3 flex-shrink-0 rounded-xl focus:outline-none focus-visible:ring-2 focus-visible:ring-sky-400/70 focus-visible:ring-offset-2 dark:focus-visible:ring-offset-slate-950"
        (click)="closeMobileMenu()"
      >
        <div
          class="logo-mark relative w-10 h-10 md:w-11 md:h-11 rounded-xl bg-blue-600 flex items-center justify-center ring-1 ring-black/10 dark:ring-white/15 shadow-md shadow-blue-600/25"
        >
          <svg class="w-5 h-5 md:w-[1.35rem] md:h-[1.35rem] text-white drop-shadow-sm" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/>
          </svg>
        </div>
        <span class="text-lg md:text-xl font-bold font-display tracking-tight">
          <span class="text-stone-900 dark:text-slate-50">Drive</span><span class="text-blue-600 dark:text-sky-400">Line</span>
        </span>
      </a>

      <!-- Desktop: pill navigation -->
      <div class="hidden lg:flex flex-1 justify-center px-2 min-w-0">
        <div class="nav-pill-track inline-flex flex-wrap items-center justify-center gap-0.5 max-w-[42rem] xl:max-w-none">
          @for (item of navItems; track item.route) {
            <a
              [routerLink]="item.route"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{exact: false}"
              class="nav-pill-link px-3 py-2 xl:px-3.5 text-[13px] xl:text-sm font-semibold text-stone-700 hover:text-blue-700 dark:text-slate-200 dark:hover:text-sky-300"
            >
              {{ item.label }}
            </a>
          }
        </div>
      </div>

      <!-- Actions -->
      <div class="flex items-center gap-2 sm:gap-2.5">
        <button
          (click)="toggleDarkMode()"
          type="button"
          class="hidden lg:flex w-10 h-10 rounded-xl items-center justify-center text-stone-500 hover:text-stone-800 hover:bg-stone-100/90 dark:text-slate-400 dark:hover:text-white dark:hover:bg-slate-800/90 transition-all duration-200 border border-transparent hover:border-stone-200/80 dark:hover:border-slate-600/80"
          [attr.aria-label]="isDarkMode() ? 'Switch to light mode' : 'Switch to dark mode'"
        >
          @if (isDarkMode()) {
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
            </svg>
          } @else {
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
            </svg>
          }
        </button>

        <a
          href="https://wa.me/447423374244"
          target="_blank"
          rel="noopener noreferrer"
          class="hidden sm:inline-flex items-center gap-2 rounded-xl bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-400 hover:to-teal-500 text-white text-sm font-bold px-4 py-2.5 shadow-lg shadow-emerald-600/25 hover:shadow-emerald-500/35 hover:-translate-y-0.5 active:translate-y-0 transition-all duration-200"
          title="Chat on WhatsApp"
        >
          <svg class="w-4 h-4 shrink-0" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          <span class="hidden md:inline">WhatsApp</span>
        </a>

        <a
          routerLink="/contact"
          class="hidden md:inline-flex items-center gap-2 rounded-xl bg-gradient-to-r from-blue-600 via-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white text-sm font-bold px-4 py-2.5 shadow-lg shadow-blue-600/30 hover:shadow-blue-500/40 hover:-translate-y-0.5 active:translate-y-0 transition-all duration-200"
        >
          <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
          </svg>
          Call Us
        </a>

        <button
          (click)="toggleMobileMenu()"
          type="button"
          class="lg:hidden relative w-11 h-11 rounded-xl flex items-center justify-center text-stone-800 bg-stone-100/90 hover:bg-stone-200/90 dark:bg-slate-800 dark:text-slate-100 dark:hover:bg-slate-700 border border-stone-200/80 dark:border-slate-600/80 transition-all duration-200 shadow-sm"
          aria-label="Toggle menu"
          [attr.aria-expanded]="isMobileMenuOpen()"
        >
          @if (isMobileMenuOpen()) {
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          } @else {
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8h16M4 16h16"/>
            </svg>
          }
        </button>
      </div>
    </div>

    <!-- Mobile / tablet menu -->
    @if (isMobileMenuOpen()) {
      <div
        class="mobile-drawer lg:hidden border-t border-stone-200/80 dark:border-slate-700/90 bg-white/95 dark:bg-slate-950/95 backdrop-blur-xl rounded-b-2xl shadow-xl shadow-slate-900/10 dark:shadow-black/40 -mx-4 px-4 sm:-mx-6 sm:px-6 pb-5 pt-2 mb-1"
      >
        <div
          class="nav-pill-track flex flex-col gap-1 rounded-2xl border border-stone-200/90 bg-stone-100/95 p-1.5 dark:border-slate-600/90 dark:bg-slate-800/95"
        >
          @for (item of navItems; track item.route) {
            <a
              [routerLink]="item.route"
              routerLinkActive="bg-white text-blue-600 shadow-md dark:bg-slate-700 dark:text-sky-300"
              [routerLinkActiveOptions]="{exact: false}"
              class="nav-pill-link px-4 py-3.5 rounded-xl text-stone-700 font-semibold dark:text-slate-200 hover:bg-stone-50 dark:hover:bg-slate-800/80"
              (click)="closeMobileMenu()"
            >
              {{ item.label }}
            </a>
          }
        </div>
        <div class="mt-4 flex flex-col sm:flex-row gap-2">
          <a
            href="https://wa.me/447423374244"
            target="_blank"
            rel="noopener noreferrer"
            (click)="closeMobileMenu()"
            class="flex-1 inline-flex items-center justify-center gap-2 rounded-xl bg-gradient-to-r from-emerald-500 to-teal-600 text-white font-bold py-3 shadow-lg shadow-emerald-600/20"
          >
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            WhatsApp
          </a>
          <a
            routerLink="/contact"
            (click)="closeMobileMenu()"
            class="flex-1 inline-flex items-center justify-center gap-2 rounded-xl bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold py-3 shadow-lg shadow-blue-600/25"
          >
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
            </svg>
            Call Us
          </a>
          <button
            type="button"
            (click)="toggleDarkMode()"
            class="sm:flex-none inline-flex w-full sm:w-12 h-12 items-center justify-center rounded-xl border border-stone-200 bg-stone-50 text-stone-600 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-300"
            aria-label="Toggle dark mode"
          >
            @if (isDarkMode()) {
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
              </svg>
            } @else {
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
              </svg>
            }
          </button>
        </div>
      </div>
    }
  </nav>
</header>
