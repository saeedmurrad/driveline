name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

# App lives in repo subfolder `driveline/` (monorepo layout).
defaults:
  run:
    working-directory: driveline

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: driveline/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build app for GitHub Pages
        run: npm run build:gh-pages

      - name: SPA fallback (GitHub Pages client routing)
        run: cp dist/driveline/browser/index.html dist/driveline/browser/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: driveline/dist/driveline/browser

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
